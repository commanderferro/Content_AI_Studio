version: '3.8'

services:
  # Neo4j - Base de datos de grafos
  neo4j:
    image: neo4j:5-community
    container_name: content_ai_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
    volumes:
      - ./data/neo4j:/data
      - ./data/neo4j_logs:/logs
      - ./data/neo4j_import:/import

  # PostgreSQL - Base de datos relacional
  postgres:
    image: postgres:15-alpine
    container_name: content_ai_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=content_ai
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # Redis - Para caché rápida
  redis:
    image: redis:7-alpine
    container_name: content_ai_redis
    restart: unless-stopped
    volumes:
      - ./data/redis:/data
    ports:
      - "6379:6379"

  # Backend - El cerebro del sistema
  backend:
    image: python:3.11-slim
    container_name: content_ai_backend
    restart: unless-stopped
    depends_on:
      - neo4j
      - postgres
      - redis
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=content_ai
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_URL=redis://redis:6379
      - WORDPRESS_URL=${WORDPRESS_URL}
      - WORDPRESS_USER=${WORDPRESS_USER}
      - WORDPRESS_APP_PASSWORD=${WORDPRESS_APP_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=${ENVIRONMENT}
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    working_dir: /app
    command: >
      sh -c "pip install fastapi uvicorn neo4j requests python-dotenv &&
             uvicorn main:app --host 0.0.0.0 --port 8000"

  # Dashboard - Interfaz web
  dashboard:
    image: python:3.11-slim
    container_name: content_ai_dashboard
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:8000
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD}
    working_dir: /app
    volumes:
      - ./dashboard:/app
    ports:
      - "8501:8501"
    command: >
      sh -c "pip install streamlit pandas &&
             streamlit run app.py --server.port=8501 --server.address=0.0.0.0"
